services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: queryscope
      POSTGRES_USER: queryscope
      POSTGRES_PASSWORD: queryscope
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queryscope -d queryscope"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    # image: kavish01/queryscope-backend:latest
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://queryscope:queryscope@postgres:5432/queryscope

  frontend:
    build: ./frontend
    # image: kavish01/queryscope-frontend:latest
    ports:
      - "5173:4173"
    depends_on:
      - backend

volumes:
  postgres_data:
  