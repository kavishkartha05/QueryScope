# ConfigMap holds non-sensitive configuration that can be version-controlled.
# Secrets hold credentials and are kept out of manifests (apply separately or
# via a secrets manager like External Secrets Operator in production).
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: queryscope
data:
  DATABASE_URL: "postgresql+asyncpg://queryscope:queryscope@postgres:5432/queryscope"
  AZURE_SEARCH_INDEX: "benchmark-runs"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: queryscope
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: queryscope-backend:latest
          # Never = always use the locally-loaded image; prevents accidental
          # pulls from a registry when running in minikube with eval $(minikube docker-env).
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DATABASE_URL
            - name: AZURE_SEARCH_INDEX
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: AZURE_SEARCH_INDEX
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: queryscope-secrets
                  key: OPENAI_API_KEY
            - name: AZURE_SEARCH_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: queryscope-secrets
                  key: AZURE_SEARCH_ENDPOINT
            - name: AZURE_SEARCH_KEY
              valueFrom:
                secretKeyRef:
                  name: queryscope-secrets
                  key: AZURE_SEARCH_KEY
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: queryscope
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
