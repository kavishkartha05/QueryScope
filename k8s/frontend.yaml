apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: queryscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: queryscope-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 4173   # Vite preview's default port
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: queryscope
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 4173
      # nodePort omitted — Kubernetes auto-assigns from the 30000–32767 range.
      # Run `kubectl get svc frontend -n queryscope` to find the assigned port,
      # then access via $(minikube ip):<nodePort>.
