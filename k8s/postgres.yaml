apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: queryscope
spec:
  accessModes:
    - ReadWriteOnce   # single-node access; matches minikube and most cloud PV classes
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: queryscope
spec:
  replicas: 1   # stateful service — never run more than one replica without a StatefulSet
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: queryscope
            - name: POSTGRES_USER
              value: queryscope
            - name: POSTGRES_PASSWORD
              value: queryscope
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "queryscope", "-d", "queryscope"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: queryscope
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
